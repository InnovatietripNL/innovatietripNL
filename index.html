<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnovatietripNL CRM – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Calibri,sans-serif;background:#EDF5FC;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border:1px solid #BDD8F0;border-radius:12px;padding:40px 36px;width:360px;box-shadow:0 4px 24px rgba(21,101,192,.1)}
.logo{font-size:13px;font-weight:700;letter-spacing:.05em;color:#1565C0;margin-bottom:6px;text-transform:uppercase}
h1{font-size:20px;font-weight:600;color:#0D2952;margin-bottom:6px}
p{font-size:12px;color:#2F5E8E;margin-bottom:24px}
label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#2F5E8E;margin-bottom:6px}
input[type=password]{width:100%;padding:10px 12px;border:1px solid #BDD8F0;border-radius:6px;font-size:14px;color:#0D2952;outline:none;background:#F0F8FE}
input[type=password]:focus{border-color:#1565C0}
button{width:100%;margin-top:16px;padding:11px;background:#1565C0;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#1251a0}
.err{display:none;margin-top:12px;font-size:12px;color:#C62828;background:#fdecea;padding:8px 12px;border-radius:6px}
.remember{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:#2F5E8E}
</style>
</head>
<body>
<div class="card">
  <div class="logo">InnovatietripNL</div>
  <h1>CRM Toegang</h1>
  <p>Voer je toegangscode in om door te gaan.</p>
  <label for="pw">Toegangscode</label>
  <input type="password" id="pw" placeholder="••••••••" autofocus />
  <label class="remember"><input type="checkbox" id="rem"> Onthoud mij 30 dagen</label>
  <button onclick="unlock()">Inloggen</button>
  <div class="err" id="err">Onjuiste toegangscode. Probeer opnieuw.</div>
</div>
<script>
const HASH = "6b1cc700bbbd0b95d08fa66963e016329c8f39e0598c6cebe614ae0e33f0af36";
const SALT = "dfb1566e38a2d8330b491904e1d1ad96f1bc3d55358dceca1fdc69867e342384";

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const h = await sha256hex(pw + SALT);
  if (h !== HASH) {
    document.getElementById('err').style.display = 'block';
    return;
  }
  if (document.getElementById('rem').checked) {
    localStorage.setItem('crm_auth', Date.now() + 30*24*60*60*1000);
  }
  window.location.href = 'crm.html';
}

// Auto-login
if (localStorage.getItem('crm_auth') && Date.now() < parseInt(localStorage.getItem('crm_auth')))
  window.location.href = 'crm.html';

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
</script>
</body>
</html>
