const SALT = "04dc229e00c689332915d53652d733c32d9702293e6c1cf1daa23ab39146572a";

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const h = await sha256hex(pw + SALT);
  if (h !== HASH) {
    document.getElementById('err').style.display = 'block';
    return;
  }
  if (document.getElementById('rem').checked) {
    const exp = Date.now() + 30*24*60*60*1000;
    localStorage.setItem('crm_auth', exp);
  }
  load();
}

function load() {
  const html = atob(ENCODED);
  document.open(); document.write(html); document.close();
}
