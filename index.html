const SALT = "a1b95960666349333a20aa2b797d501fdeeca41a3f7c118d822339964f745a72";

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const h = await sha256hex(pw + SALT);
  if (h !== HASH) {
    document.getElementById('err').style.display = 'block';
    return;
  }
  if (document.getElementById('rem').checked) {
    const exp = Date.now() + 30*24*60*60*1000;
    localStorage.setItem('crm_auth', exp);
  }
  load();
}

function load() {
  const html = atob(ENCODED);
  document.open(); document.write(html); document.close();
}

// Auto-login if remembered
const stored = localStorage.getItem('crm_auth');
if (stored && Date.now() < parseInt(stored)) load();

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
</script>
